<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="apex"/>
<meta name="theme-color" content="#080809"/>
<title>apex training</title>
<link rel="manifest" href="manifest.json"/>

<body style="margin:0;padding:0;background:#080809;">
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#5a5a64;font-family:monospace;font-size:13px;">Loading...</div></div>
<script>
window.onerror=function(msg,src,line){
  document.getElementById('root').innerHTML='<div style="padding:30px;font-family:monospace;color:#f87171;background:#080809;min-height:100vh"><b>Error on line '+line+'</b><br><br>'+msg+'</div>';
  return true;
};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
if(typeof React==='undefined'){document.getElementById('root').innerHTML='<div style="padding:30px;color:#f87171;font-family:monospace">Failed to load React. Check internet.</div>';}
</script>
<script>
const STRAVA_CLIENT_ID     = "247028";
const STRAVA_CLIENT_SECRET = "00a9a7ca70c325a2e3a4f06de6a023f1a6fa1491";
const STRAVA_REDIRECT_URI  = "https://dmjetley.github.io/apex-training/";
const STRAVA_SCOPE         = "activity:read_all";

const StravaAuth = {
getTokens() { try { return JSON.parse(localStorage.getItem(“stravaTokens”)||“null”); } catch { return null; } },
saveTokens(d) { localStorage.setItem(“stravaTokens”, JSON.stringify({ accessToken:d.access_token, refreshToken:d.refresh_token, expiresAt:d.expires_at, athlete:d.athlete })); },
clearTokens() { localStorage.removeItem(“stravaTokens”); },
isExpired() { const t=this.getTokens(); return !t || Date.now()/1000 > t.expiresAt-300; },
async refreshIfNeeded() {
if (!this.isExpired()) return this.getTokens().accessToken;
const t = this.getTokens();
if (!t||!t.refreshToken) return null;
try {
const res = await fetch(“https://www.strava.com/oauth/token”, { method:“POST”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify({ client_id:STRAVA_CLIENT_ID, client_secret:STRAVA_CLIENT_SECRET, refresh_token:t.refreshToken, grant_type:“refresh_token” }) });
const d = await res.json();
if (d.access_token) { this.saveTokens(d); return d.access_token; }
} catch(e) { console.error(e); }
return null;
},
async fetchActivities(after) {
const token = await this.refreshIfNeeded();
if (!token) return [];
try {
const res = await fetch(“https://www.strava.com/api/v3/athlete/activities?per_page=50&after=”+after, { headers:{ Authorization:“Bearer “+token } });
const d = await res.json();
return Array.isArray(d) ? d : [];
} catch(e) { return []; }
},
startOAuth() {
const p = new URLSearchParams({ client_id:STRAVA_CLIENT_ID, redirect_uri:STRAVA_REDIRECT_URI, response_type:“code”, approval_prompt:“auto”, scope:STRAVA_SCOPE });
window.location.href = “https://www.strava.com/oauth/authorize?”+p;
},
async handleCallback(code) {
const res = await fetch(“https://www.strava.com/oauth/token”, { method:“POST”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify({ client_id:STRAVA_CLIENT_ID, client_secret:STRAVA_CLIENT_SECRET, code, grant_type:“authorization_code” }) });
const d = await res.json();
if (d.access_token) { this.saveTokens(d); return true; }
return false;
},
};

(async () => {
const p = new URLSearchParams(window.location.search);
const code = p.get(“code”);
if (p.get(“error”)) { window.history.replaceState({}, “”, STRAVA_REDIRECT_URI); return; }
if (code) { await StravaAuth.handleCallback(code); window.location.replace(STRAVA_REDIRECT_URI); }
})();

</script>
<script>
var useState=React.useState,useReducer=React.useReducer,useMemo=React.useMemo;
</script>
<script src="app.js"></script>
<script>
if("serviceWorker"in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
</script>
</body>
</html>
