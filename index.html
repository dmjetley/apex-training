<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const STRAVA_CLIENT_ID     = "247028";
const STRAVA_CLIENT_SECRET = "27e97d01183fc2bfc089b587dc32ca82f8c203aa";
const STRAVA_REDIRECT_URI  = "https://dmjetley.github.io/apex-training/";
const STRAVA_SCOPE         = "activity:read_all";

window.StravaAuth = {
getTokens: function() {
try { return JSON.parse(localStorage.getItem(“stravaTokens”)||“null”); } catch(e) { return null; }
},
saveTokens: function(d) {
localStorage.setItem(“stravaTokens”, JSON.stringify({
accessToken: d.access_token, refreshToken: d.refresh_token,
expiresAt: d.expires_at, athlete: d.athlete
}));
},
clearTokens: function() { localStorage.removeItem(“stravaTokens”); },
isExpired: function() {
var t = this.getTokens();
return !t || Date.now()/1000 > t.expiresAt - 300;
},
refreshIfNeeded: function() {
if (!this.isExpired()) return Promise.resolve(this.getTokens().accessToken);
var t = this.getTokens();
if (!t || !t.refreshToken) return Promise.resolve(null);
return fetch(“https://www.strava.com/oauth/token”, {
method: “POST”,
headers: {“Content-Type”: “application/json”},
body: JSON.stringify({client_id: STRAVA_CLIENT_ID, client_secret: STRAVA_CLIENT_SECRET,
refresh_token: t.refreshToken, grant_type: “refresh_token”})
}).then(function(r) { return r.json(); }).then(function(d) {
if (d.access_token) { StravaAuth.saveTokens(d); return d.access_token; }
return null;
}).catch(function() { return null; });
},
fetchActivities: function(after) {
return StravaAuth.refreshIfNeeded().then(function(token) {
if (!token) return [];
return fetch(“https://www.strava.com/api/v3/athlete/activities?per_page=50&after=”+after,
{headers: {Authorization: “Bearer “+token}})
.then(function(r) { return r.json(); })
.then(function(d) { return Array.isArray(d) ? d : []; })
.catch(function() { return []; });
});
},
startOAuth: function() {
var p = new URLSearchParams({client_id: STRAVA_CLIENT_ID, redirect_uri: STRAVA_REDIRECT_URI,
response_type: “code”, approval_prompt: “auto”, scope: STRAVA_SCOPE});
window.location.href = “https://www.strava.com/oauth/authorize?”+p;
},
handleCallback: function(code) {
return fetch(“https://www.strava.com/oauth/token”, {
method: “POST”,
headers: {“Content-Type”: “application/json”},
body: JSON.stringify({client_id: STRAVA_CLIENT_ID, client_secret: STRAVA_CLIENT_SECRET,
code: code, grant_type: “authorization_code”})
}).then(function(r) { return r.json(); }).then(function(d) {
if (d.access_token) { StravaAuth.saveTokens(d); return true; }
return false;
});
}
};

(function() {
var p = new URLSearchParams(window.location.search);
var code = p.get(“code”);
if (p.get(“error”)) { window.history.replaceState({}, “”, STRAVA_REDIRECT_URI); return; }
if (code) {
StravaAuth.handleCallback(code).then(function() {
window.location.replace(STRAVA_REDIRECT_URI);
});
}
})();
</script>
